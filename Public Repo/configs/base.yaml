# PBMRS Base Configuration — v2.2 (calibration fix)
# A simulation run is fully determined by (config + seed + code version).
#
# CALIBRATION NOTE (v2.2):
#   alpha_r raised from 1.0 to 12.0. This is the critical fix for regime separation.
#   With alpha_r=1.0, the feedback loop was 9x weaker than the noise floor (SNR~0.11).
#   At alpha_r=12.0, the feedback SNR rises to ~1.3, enabling meaningful vol clustering,
#   MDD scaling, and herding fraction separation across J regimes.
#   All other parameters unchanged from v2.0.

# ── Reproducibility ───────────────────────────────────────────────────────────
seed:      42
timesteps: 2000
dt:        1.0

# ── Agent layer (Eq. 1, 6) ───────────────────────────────────────────────────
n_agents: 2000
q0: 0.0005   # q0*N = 1.0, so Qt = mt ∈ [-1,1] at full herding

beta: 1.2
J:    0.5    # J*beta = 0.60 (subcritical). Critical boundary: J < 1/beta = 0.833.

# ── Market field weights (Eq. 5) ─────────────────────────────────────────────
alpha_r: 12.0   # trend-following weight — CALIBRATED from 1.0 (v2.2)
                # SNR analysis: alpha_r must satisfy alpha_r*sigma_eps*beta >> 1/sqrt(N)
                # for feedback to overcome finite-size noise at N=2000.
alpha_v: 0.001  # volatility-aversion weight
alpha_l: 0.1    # liquidity-stress weight
alpha_0: 0.0    # baseline behavioral bias

# ── Return dynamics (Eq. 2) ───────────────────────────────────────────────────
mu0:       0.0
lam:       0.05
sigma_eps: 0.01

# ── Volatility dynamics (Eq. 3) ───────────────────────────────────────────────
kappa_v: 0.05
theta_v: 1.0
eta_v:   0.85    # ARCH amplification. Stability: eta_v < kappa_v/(sigma^2*16) = 31.2 ✓
gamma_v: 0.050   # crowding amplification

# ── Liquidity dynamics (Eq. 4) ────────────────────────────────────────────────
kappa_l: 0.03
l0:      1.0
eta_l:   0.015
gamma_l: 0.030

# ── Price-impact floor (Eq. 2) ───────────────────────────────────────────────
impact_eps: 0.010

# ── Constraints ───────────────────────────────────────────────────────────────
min_vol:       0.0
min_liquidity: 1.0e-6

# ── Initial conditions ────────────────────────────────────────────────────────
x0: 0.0
v0: 1.0    # warm start at theta_v

# ── Notebook demo J values (use with alpha_r=12.0) ───────────────────────────
# Subcritical:  J=0.40  (J*beta=0.48)  — baseline stable regime
# Near-critical: J=0.65 (J*beta=0.78)  — emerging instability
# Critical:      J=0.78 (J*beta=0.94)  — near phase transition
# Supercritical: J=0.90 (J*beta=1.08)  — full herding (use with care: v may explode)