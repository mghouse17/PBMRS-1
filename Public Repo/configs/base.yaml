# PBMRS Base Configuration — v2 (post-review + structural fixes)
# A simulation run is fully determined by (config + seed + code version).

# ── Reproducibility ───────────────────────────────────────────────────────────
seed:      42
timesteps: 2000
dt:        1.0

# ── Agent layer (Eq. 1, 6) ───────────────────────────────────────────────────
n_agents: 2000
q0: 0.0005   # sized so Qt = mt ∈ [-1,1] at n_agents=2000 (q0*N=1.0)

beta: 1.2
J:    0.5    # J*beta = 0.60 (subcritical). Raise toward 1/beta≈0.833 for near-critical.

# ── Market field weights (Eq. 5) ─────────────────────────────────────────────
alpha_r: 1.0    # trend-following weight
alpha_v: 0.001  # volatility-aversion weight
alpha_l: 0.1    # liquidity-stress weight
alpha_0: 0.0    # baseline behavioral bias

# ── Return dynamics (Eq. 2) ───────────────────────────────────────────────────
mu0:       0.0
lam:       0.05
sigma_eps: 0.01

# ── Volatility dynamics (Eq. 3) ───────────────────────────────────────────────
kappa_v: 0.05
theta_v: 1.0
eta_v:   0.85
# RAISED from 0.001: crowding now meaningfully amplifies vol.
# gamma_v * mt^2 contribution at mt=0.3: 0.05*0.09=0.0045/step → +0.09 above theta_v in EWMA.
gamma_v: 0.050

# ── Liquidity dynamics (Eq. 4, FIXED) ────────────────────────────────────────
# FIX: gamma_l now penalises EXCESS volatility (vt - theta_v), not absolute vt.
# Fixed point: if lt=l0, Qt=0, vt=theta_v → lt+1 = l0 (calm stays calm).
kappa_l: 0.03
l0:      1.0
# RAISED from 0.005: flow depletion noticeable at Qt~0.5
eta_l:   0.015
# RAISED from 0.002: only fires on stress so can be larger safely
gamma_l: 0.030

# ── Price-impact floor (Eq. 2) ───────────────────────────────────────────────
# Prevents impact blowup when lt → min_liquidity.
# Effective denominator: max(lt, impact_eps).
impact_eps: 0.010

# ── Constraints ───────────────────────────────────────────────────────────────
min_vol:       0.0
min_liquidity: 1.0e-6

# ── Initial conditions ────────────────────────────────────────────────────────
x0:      0.0
v0:      1.0   # warm start at theta_v
l0_init: 1.0   # warm start at l0